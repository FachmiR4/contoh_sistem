<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Smart PDF Reader</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 900px;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #999;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .upload-section {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 2px dashed #667eea;
    }

    .upload-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="file"] {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      flex: 1;
    }

    .status-bar {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: #666;
      display: none;
    }

    .status-bar.active {
      display: block;
    }

    .status-bar.success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid #4caf50;
    }

    .chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 8px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      background: #e3f2fd;
      border-left: 4px solid #667eea;
    }

    .message.ai {
      background: #f3e5f5;
      border-left: 4px solid #764ba2;
    }

    .message.system {
      background: #fff3e0;
      border-left: 4px solid #ff9800;
      font-size: 13px;
    }

    .message-sender {
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 5px;
      color: #555;
    }

    .message-content {
      color: #333;
      line-height: 1.5;
    }

    .result-item {
      background: white;
      padding: 10px;
      margin: 5px 0;
      border-left: 3px solid #667eea;
      font-size: 13px;
    }

    .result-item.match {
      background: #fffacd;
      border-left-color: #ffd700;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      padding: 12px 20px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      font-size: 13px;
    }

    .stat {
      color: #999;
    }

    .stat-value {
      color: #667eea;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 AI Smart PDF Reader</h1>
  <p class="subtitle">Baca PDF, ubah jadi data, query seperti manusia</p>

  <div class="upload-section">
    <div class="upload-group">
      <input type="file" id="fileInput" accept=".pdf">
      <button onclick="loadPDF()">📥 Buka PDF</button>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-group">
    <input type="text" id="question" placeholder="💬 Tanya apa saja dari PDF... (contoh: data bulan januari, status ditolak, lokasi divisi IT)" autocomplete="off">
    <button onclick="askQuestion()">Kirim</button>
  </div>

  <div class="stats">
    <div class="stat">Data Total: <span class="stat-value" id="totalData">0</span></div>
    <div class="stat">Waktu Query: <span class="stat-value" id="queryTime">0ms</span></div>
    <div class="stat">Hasil: <span class="stat-value" id="resultCount">0</span></div>
  </div>
</div>

<script>
// ==================== DATA STORAGE ====================
let database = [];
let index = {};
let pdfLoaded = false;

// ==================== UTILITY FUNCTIONS ====================

// Levenshtein distance untuk fuzzy matching
function levenshteinDistance(a, b) {
  const matrix = [];
  for (let i = 0; i <= b.length; i++) {
    matrix[i] = [i];
  }
  for (let j = 0; j <= a.length; j++) {
    matrix[0][j] = j;
  }
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }
  return matrix[b.length][a.length];
}

// Fuzzy match dengan threshold
function fuzzyMatch(query, target, threshold = 2) {
  const score = levenshteinDistance(query.toLowerCase(), target.toLowerCase());
  return score <= threshold;
}

// Create inverted index untuk fast search
function buildIndex(data) {
  const idx = {};
  data.forEach((item, dataIndex) => {
    Object.values(item).forEach(value => {
      if (value) {
        const words = String(value).toLowerCase().split(/\s+/);
        words.forEach(word => {
          if (!idx[word]) idx[word] = [];
          if (!idx[word].includes(dataIndex)) {
            idx[word].push(dataIndex);
          }
        });
      }
    });
  });
  return idx;
}

// ==================== PDF PROCESSING ====================

async function loadPDF() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert('❌ Upload PDF dulu!');

  const status = showStatus('📖 Membaca PDF...', false);

  try {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    let fullText = '';
    const startTime = Date.now();

    // Extract semua text dari PDF
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(item => item.str).join(' ');
      fullText += text + '\n';
    }

    // Parse data dengan multiple strategies
    database = parseSmartData(fullText);
    index = buildIndex(database);

    const readTime = Date.now() - startTime;
    pdfLoaded = true;

    showStatus(`✅ PDF berhasil dibaca! ${pdf.numPages} halaman, ${database.length} data dalam ${readTime}ms`, true);
    addChat('System', `✨ PDF siap! Ditemukan <b>${database.length} data</b> dari <b>${pdf.numPages} halaman</b>. Tanya apa saja tentang PDF ini!`);

    document.getElementById('totalData').textContent = database.length;

  } catch (error) {
    showStatus(`❌ Error: ${error.message}`, false);
    addChat('System', '❌ Error membaca PDF');
  }
}

// Smart parsing dengan multiple strategies
function parseSmartData(text) {
  const data = [];

  // Strategy 1: Parse table rows dengan flexible format
  const lines = text.split('\n').filter(l => l.trim().length > 0);

  lines.forEach((line, idx) => {
    const parts = line.split(/\s{2,}|,|;/).map(p => p.trim()).filter(p => p);

    if (parts.length >= 3) {
      // Try to identify columns
      const item = {
        _raw: line,
        _line: idx,
        columns: {}
      };

      // Extract numbers
      const numbers = line.match(/\d+/g) || [];
      if (numbers.length > 0) item.columns.no = numbers[0];

      // Extract dates
      const dates = line.match(/\d{2}-\d{2}-\d{4}|\d{4}-\d{2}-\d{2}/g) || [];
      if (dates.length > 0) item.columns.tanggal = dates[0];

      // Extract status
      const statusMatch = line.match(/disetujui|ditolak|pending|proses|selesai/i);
      if (statusMatch) item.columns.status = statusMatch[0];

      // Store all parts
      parts.forEach((part, i) => {
        item.columns[`col_${i}`] = part;
      });

      // Only add if has meaningful content
      if (Object.keys(item.columns).length > 1) {
        data.push(item);
      }
    }
  });

  return data;
}

// ==================== SEARCH & QUERY ====================

function askQuestion() {
  const q = document.getElementById('question').value.trim();
  if (!q) return;
  if (!pdfLoaded) return alert('❌ Load PDF dulu!');

  addChat('Kamu', q);

  const startTime = Date.now();
  const results = smartSearch(q);
  const queryTime = Date.now() - startTime;

  document.getElementById('queryTime').textContent = queryTime + 'ms';
  document.getElementById('resultCount').textContent = results.length;

  if (results.length === 0) {
    addChat('AI', '🤔 Hmm, tidak menemukan data yang cocok. Coba tanya dengan kata kunci yang berbeda.');
  } else {
    const formatted = formatResults(results);
    addChat('AI', formatted);
  }

  document.getElementById('question').value = '';
}

function smartSearch(query) {
  const q = query.toLowerCase();
  let results = [];

  // Parse query intent
  const hasNumber = /\d+/.test(q);
  const hasDate = /\d{2}-\d{2}-\d{4}|\d{4}-\d{2}-\d{2}|\d{4}|\d{2}/.test(q);
  const hasStatus = /(setuju|tolak|pending|proses|selesai)/i.test(q);

  // Category keywords
  const keywords = q.split(/\s+/);

  // Search dengan scoring
  database.forEach((item, idx) => {
    let score = 0;
    let matches = [];

    Object.entries(item.columns).forEach(([key, val]) => {
      const valStr = String(val).toLowerCase();

      // Exact match
      if (valStr === q) {
        score += 100;
        matches.push(key);
      }

      // Partial match
      if (valStr.includes(q)) {
        score += 50;
        matches.push(key);
      }

      // Fuzzy match
      keywords.forEach(kw => {
        if (fuzzyMatch(kw, valStr, 2)) {
          score += 20;
          matches.push(key);
        }
      });

      // Number match
      if (hasNumber) {
        const numbers = valStr.match(/\d+/g) || [];
        if (numbers.some(n => q.includes(n))) {
          score += 30;
          matches.push(key);
        }
      }

      // Date logic
      if (hasDate && key.includes('tanggal')) {
        score += 25;
      }

      // Status logic
      if (hasStatus && key.includes('status')) {
        score += 25;
      }
    });

    if (score > 0) {
      results.push({
        ...item,
        score,
        matches: [...new Set(matches)]
      });
    }
  });

  // Sort by score
  results.sort((a, b) => b.score - a.score);

  return results.slice(0, 10); // Limit hasil
}

// ==================== UI & FORMATTING ====================

function formatResults(results) {
  let html = `<div style="font-size: 13px;">`;
  html += `<b>📊 Ditemukan ${results.length} hasil:</b><br><br>`;

  results.forEach((item, idx) => {
    html += `<div class="result-item match">`;
    html += `<b>#${idx + 1}</b> (Score: ${item.score})<br>`;

    Object.entries(item.columns).forEach(([key, val]) => {
      if (key !== '_line' && val) {
        const isBold = item.matches.includes(key);
        const display = isBold
          ? `<b style="color: #d32f2f;">${val}</b>`
          : val;
        html += `${key}: ${display}<br>`;
      }
    });

    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

function addChat(sender, text) {
  const box = document.getElementById('chatBox');
  const msgClass = sender === 'Kamu' ? 'user' : sender === 'System' ? 'system' : 'ai';

  const html = `
    <div class="message ${msgClass}">
      <div class="message-sender">${sender}</div>
      <div class="message-content">${text}</div>
    </div>
  `;

  box.innerHTML += html;
  box.scrollTop = box.scrollHeight;
}

function showStatus(msg, success) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.classList.add('active');
  if (success) bar.classList.add('success');
  else bar.classList.remove('success');
  return bar;
}

// Keyboard enter
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('question').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') askQuestion();
  });
});
</script>

</body>
</html>
