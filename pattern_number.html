<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Pola Angka</title>
<style>
    :root {
        --bg-primary: #1b1f3b;
        --bg-secondary: rgba(255, 255, 255, 0.12);
        --accent: #ffca28;
        --accent-strong: #f5b700;
        --text-light: #f4f7ff;
        --text-muted: #c9d1ff;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Poppins', Arial, sans-serif;
        background: radial-gradient(circle at top left, #7b61ff 0%, transparent 30%),
                    radial-gradient(circle at bottom right, #24d7ff 0%, transparent 25%),
                    linear-gradient(135deg, #0f1325 0%, #171a38 60%, #2d3161 100%);
        color: var(--text-light);
        text-align: center;
        padding: 30px;
    }

    .game-card {
        width: min(520px, 100%);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 32px;
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        padding: 36px 32px;
    }

    .game-card h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 3vw, 2.8rem);
        letter-spacing: 0.05em;
    }

    .game-card p {
        margin: 0 0 28px;
        color: var(--text-muted);
        font-size: 1rem;
    }

    #pattern {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 96px;
        margin: 0 auto 24px;
        padding: 18px 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        font-size: clamp(1.4rem, 2vw, 2rem);
        letter-spacing: 0.12em;
        color: var(--text-light);
    }

    .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
        margin-bottom: 22px;
    }

    input {
        width: 140px;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-light);
        font-size: 1rem;
        text-align: center;
        outline: none;
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
        border-color: rgba(255, 202, 40, 0.85);
        box-shadow: 0 0 0 6px rgba(255, 202, 40, 0.12);
        transform: translateY(-1px);
    }

    button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        padding: 14px 22px;
        border-radius: 18px;
        border: none;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 30px rgba(26, 88, 255, 0.18);
    }

    button:active {
        transform: translateY(0);
    }

    .btn-primary {
        background: linear-gradient(135deg, #7f5cff, #4487ff);
        color: white;
        box-shadow: 0 14px 28px rgba(62, 96, 255, 0.28);
    }

    .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-light);
        border: 1px solid rgba(255, 255, 255, 0.16);
    }

    #info {
        display: flex;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        color: var(--text-muted);
        font-size: 1rem;
    }

    .status-chip {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        min-width: 140px;
    }

    @media (max-width: 420px) {
        .controls {
            flex-direction: column;
        }

        input {
            width: 100%;
        }

        button {
            width: 100%;
        }
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
    }

    .modal-content {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px;
        margin: 15% auto;
        padding: 20px;
        width: 80%;
        max-width: 400px;
        text-align: center;
        color: var(--text-light);
    }

    .modal-content h2 {
        margin: 0 0 16px;
    }

    .modal-content p {
        margin: 0 0 20px;
    }

    .modal-content button {
        background: linear-gradient(135deg, #7f5cff, #4487ff);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
    }
</style>
</head>
<body>

<section class="game-card">
    <h1>🧠 Game Pola Angka</h1>
    <p>Temukan angka berikutnya dengan 5 kesempatan sebelum waktu habis atau kesempatan habis.</p>

    <div id="pattern">Klik mulai</div>

    <div class="controls">
        <input type="number" id="answer" placeholder="Jawaban" autocomplete="off" />
        <button class="btn-primary" onclick="checkAnswer()">Jawab</button>
        <button class="btn-secondary" onclick="startGame()">Mulai Game</button>
    </div>

    <div id="info">
        <div class="status-chip">⏱ Waktu: <span id="time">0</span></div>
        <div class="status-chip">⭐ Skor: <span id="score">0</span></div>
        <div class="status-chip">🎯 Kesempatan: <span id="attempts">5</span></div>
    </div>

    <div id="highscores">
        <div class="status-chip">🏆 Skor Tertinggi: <span id="highScore">0</span></div>
        <div class="status-chip">⏳ Waktu Tertinggi: <span id="highTime">0</span></div>
    </div>
</section>

<!-- Modal -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Kamu Salah!</h2>
        <p id="modalMessage"></p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
let currentAnswer = 0;
let score = 0;
let time = 0;
let attempts = 5;
let timer;
let highScore = 0;
let highTime = 0;

// Load high scores from localStorage
function loadHighScores() {
    highScore = parseInt(localStorage.getItem('highScore')) || 0;
    highTime = parseInt(localStorage.getItem('highTime')) || 0;
    document.getElementById("highScore").innerText = highScore;
    document.getElementById("highTime").innerText = highTime;
}

// Update high scores
function updateHighScores() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('highScore', highScore);
        document.getElementById("highScore").innerText = highScore;
    }
    if (time > highTime) {
        highTime = time;
        localStorage.setItem('highTime', highTime);
        document.getElementById("highTime").innerText = highTime;
    }
}

// Load high scores on page load
window.onload = loadHighScores;

// Modal functions
function showModal(title, message) {
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalMessage").innerText = message;
    document.getElementById("myModal").style.display = "block";
}

function closeModal() {
    document.getElementById("myModal").style.display = "none";
    // Only generate new pattern if not game over
    if (attempts > 0 && time < 60) {
        generatePattern();
    }
}

function startGame() {
    score = 0;
    time = 0;
    attempts = 5;

    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;
    document.getElementById("attempts").innerText = attempts;

    generatePattern();

    clearInterval(timer);
    timer = setInterval(() => {
        time++;
        document.getElementById("time").innerText = time;

        if (time >= 60) {
            clearInterval(timer);
            updateHighScores();
            showModal("Game Over", "Waktu habis! Skor kamu: " + score);
        }
    }, 1000);
}

function generatePattern() {
    const type = Math.floor(Math.random() * 4);
    let pattern = [];

    if (type === 0) {
        // Penjumlahan
        let start = Math.floor(Math.random() * 10);
        let step = Math.floor(Math.random() * 5) + 1;

        for (let i = 0; i < 5; i++) {
            pattern.push(start + i * step);
        }
        currentAnswer = start + 5 * step;

    } else if (type === 1) {
        // Perkalian
        let start = Math.floor(Math.random() * 5) + 1;
        let mult = Math.floor(Math.random() * 3) + 2;

        for (let i = 0; i < 5; i++) {
            pattern.push(start * Math.pow(mult, i));
        }
        currentAnswer = start * Math.pow(mult, 5);

    } else if (type === 2) {
        // Fibonacci
        let a = 1, b = 1;
        pattern = [a, b];
        for (let i = 2; i < 5; i++) {
            let next = a + b;
            pattern.push(next);
            a = b;
            b = next;
        }
        currentAnswer = a + b;

    } else {
        // Campuran sederhana
        let num = Math.floor(Math.random() * 10) + 1;
        pattern.push(num);

        for (let i = 1; i < 5; i++) {
            if (i % 2 === 0) {
                num += 2;
            } else {
                num *= 2;
            }
            pattern.push(num);
        }

        if (5 % 2 === 0) {
            currentAnswer = num + 2;
        } else {
            currentAnswer = num * 2;
        }
    }

    document.getElementById("pattern").innerText =
        pattern.join(" , ") + " , ?";

    document.getElementById("answer").value = "";
}

function checkAnswer() {
    const userAnswer = parseInt(document.getElementById("answer").value);

    if (userAnswer === currentAnswer) {
        score++;
        document.getElementById("score").innerText = score;
        generatePattern();
    } else {
        attempts--;
        document.getElementById("attempts").innerText = attempts;
        if (attempts <= 0) {
            clearInterval(timer);
            updateHighScores();
            showModal("Game Over", "Kesempatan habis! Skor kamu: " + score);
        } else {
            showModal("Kamu Salah!", "Jawaban benar: " + currentAnswer + ". Kesempatan tersisa: " + attempts);
        }
    }
}
</script>

</body>
</html>
