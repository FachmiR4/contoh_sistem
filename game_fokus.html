<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Fokus Angka</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        height: 100%;
    }

    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(180deg, #5ec3d6 0%, #7a92f2 40%, #292e7a 100%);
        color: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 18px 12px 24px;
        box-sizing: border-box;
    }

    h1 {
        margin: 0;
        margin-bottom: 16px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        color: #fff;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
    }

    .controls {
        display: grid;
        gap: 10px;
        width: min(100%, 500px);
        margin: 0 auto 16px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(14px);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 18px 50px rgba(0,0,0,0.18);
    }

    .controls label {
        font-weight: 600;
        color: #fff;
    }

    select, input, button {
        width: 100%;
        padding: 14px 12px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 16px;
        box-sizing: border-box;
    }

    select, input {
        background: rgba(255,255,255,0.9);
    }

    button {
        background: #ffb703;
        color: #111;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    #grid {
        display: grid;
        gap: 8px;
        margin: 16px auto 0;
        grid-template-columns: repeat(5, 60px);
        justify-content: center;
        justify-items: center;
    }

    .cell {
        background: rgba(255,255,255,0.95);
        border: 2px solid rgba(0,0,0,0.2);
        font-size: clamp(1rem, 2vw, 1.3rem);
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1;
        max-width: 90px;
        width: 100%;
        border-radius: 14px;
        transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease;
    }

    .cell:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 16px rgba(0,0,0,0.1);
    }

    #modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.2s ease, visibility 0.2s ease;
        z-index: 10;
    }

    #modal.visible {
        visibility: visible;
        opacity: 1;
    }

    .modal-content {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
        min-width: 260px;
    }

    .modal-content h2 {
        margin-top: 0;
        margin-bottom: 12px;
    }

    .modal-content button {
        margin-top: 16px;
        padding: 10px 18px;
        border: none;
        background: #4caf50;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }

    .cell.correct {
        background: #4caf50;
        color: white;
        cursor: default;
    }

    .cell.wrong {
        background: #f44336;
        color: white;
    }

    #info {
        margin-top: 15px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>🎯 Game Fokus Angka</h1>

<div class="controls">
    <label>Level:</label>
    <select id="level">
        <option value="60">Easy (60 detik)</option>
        <option value="40">Medium (40 detik)</option>
        <option value="30">Hard (30 detik)</option>
        <option value="25">Master (25 detik)</option>
    </select>

    <label>Max Angka:</label>
    <input type="number" id="maxNumber" value="25" min="25">

    <button onclick="startGame()">Mulai Game</button>
</div>

<div id="info">
    ⏱ Waktu: <span id="time">0</span> detik |
    🎯 Target: <span id="target">1</span> |
    ❤️ Nyawa: <span id="lives">4</span>
</div>

<div id="grid" ></div>

<div id="modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
        <button onclick="closeModal()">Main Lagi</button>
    </div>
</div>

<script>
let numbers = [];
let current = 1;
let timer;
let timeLeft = 0;
let lives = 4;
let gameOver = false;

function startGame() {
    clearInterval(timer);
    closeModal();

    const max = parseInt(document.getElementById("maxNumber").value);
    if (max < 25) {
        alert("Minimal angka adalah 25!");
        return;
    }

    current = 1;
    timeLeft = parseInt(document.getElementById("level").value);
    lives = 4;
    gameOver = false;

    document.getElementById("target").innerText = current;
    document.getElementById("time").innerText = timeLeft;
    document.getElementById("lives").innerText = lives;

    numbers = Array.from({length: max}, (_, i) => i + 1);
    numbers.sort(() => Math.random() - 0.5);

    renderGrid(numbers);

    timer = setInterval(() => {
        if (gameOver) {
            clearInterval(timer);
            return;
        }

        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            endGame(false, "Waktu habis! You lose!");
        }
    }, 1000);
}

function renderGrid(nums) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    nums.forEach(num => {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.innerText = num;

        cell.onclick = () => handleClick(cell, num);

        grid.appendChild(cell);
    });
}

function handleClick(cell, num) {
    if (gameOver) return;

    if (num === current) {
        cell.classList.add("correct");
        current++;
        document.getElementById("target").innerText = current;

        if (current > numbers.length) {
            clearInterval(timer);
            endGame(true, "🎉 You win! Kamu selesai tepat waktu!");
        }
    } else {
        cell.classList.add("wrong");
        decrementLife();
        setTimeout(() => cell.classList.remove("wrong"), 300);
    }
}

function decrementLife() {
    if (gameOver) return;
    lives--;
    document.getElementById("lives").innerText = lives;

    if (lives <= 0) {
        clearInterval(timer);
        endGame(false, "Kamu kehabisan nyawa! You lose!");
    }
}

function endGame(win, message) {
    gameOver = true;
    showModal(win ? "You win!" : "You lose!", message);
}

function showModal(title, text) {
    document.getElementById("modal-title").innerText = title;
    document.getElementById("modal-text").innerText = text;
    document.getElementById("modal").classList.add("visible");
}

function closeModal() {
    document.getElementById("modal").classList.remove("visible");
}
</script>

</body>
</html>
